# -------------------------
# Реле включения машины
# -------------------------

switch:
  - platform: template
    name: "Silvia Pressure Profile Startup Boost"
    id: silvia_pressure_profile_startup_boost
    lambda: 'return id(silvia_pressure_profile_startup_boost_enabled);'
    turn_on_action:
      - lambda: |-
          id(silvia_pressure_profile_startup_boost_enabled) = true;
          id(silvia_pressure_profile_startup_boost).publish_state(true);
    turn_off_action:
      - lambda: |-
          id(silvia_pressure_profile_startup_boost_enabled) = false;
          id(silvia_pressure_profile_startup_boost).publish_state(false);

  - platform: template
    name: "Silvia Pump Start Boost"
    id: silvia_pump_start_boost
    lambda: 'return id(silvia_pump_start_boost_enabled);'
    turn_on_action:
      - lambda: |-
          id(silvia_pump_start_boost_enabled) = true;
          id(silvia_pump_start_boost).publish_state(true);
          id(silvia_pump_dimmer).set_start_boost_ms((uint32_t) id(silvia_pump_start_boost_ms).state);
    turn_off_action:
      - lambda: |-
          id(silvia_pump_start_boost_enabled) = false;
          id(silvia_pump_start_boost).publish_state(false);
          id(silvia_pump_dimmer).set_start_boost_ms(0);

  - platform: template
    name: "Silvia Preinfusion Boost"
    id: silvia_preinfusion_boost
    lambda: 'return id(silvia_preinfusion_boost_enabled);'
    turn_on_action:
      - lambda: |-
          id(silvia_preinfusion_boost_enabled) = true;
          id(silvia_preinfusion_boost).publish_state(true);
      - if:
          condition:
            lambda: 'return !id(shot_profile_applying) && id(silvia_shot_profile).current_option() != "Custom";'
          then:
            - select.set:
                id: silvia_shot_profile
                option: "Custom"
      - component.update: silvia_shot_profile_preview
    turn_off_action:
      - lambda: |-
          id(silvia_preinfusion_boost_enabled) = false;
          id(silvia_preinfusion_boost).publish_state(false);
      - if:
          condition:
            lambda: 'return !id(shot_profile_applying) && id(silvia_shot_profile).current_option() != "Custom";'
          then:
            - select.set:
                id: silvia_shot_profile
                option: "Custom"
      - component.update: silvia_shot_profile_preview

  - platform: template
    name: "Silvia Main Brew Boost"
    id: silvia_main_brew_boost
    lambda: 'return id(silvia_main_brew_boost_enabled);'
    turn_on_action:
      - lambda: |-
          id(silvia_main_brew_boost_enabled) = true;
          id(silvia_main_brew_boost).publish_state(true);
      - if:
          condition:
            lambda: 'return !id(shot_profile_applying) && id(silvia_shot_profile).current_option() != "Custom";'
          then:
            - select.set:
                id: silvia_shot_profile
                option: "Custom"
      - component.update: silvia_shot_profile_preview
    turn_off_action:
      - lambda: |-
          id(silvia_main_brew_boost_enabled) = false;
          id(silvia_main_brew_boost).publish_state(false);
      - if:
          condition:
            lambda: 'return !id(shot_profile_applying) && id(silvia_shot_profile).current_option() != "Custom";'
          then:
            - select.set:
                id: silvia_shot_profile
                option: "Custom"
      - component.update: silvia_shot_profile_preview

  - platform: template
    # Historical HA-facing name; there is no physical power relay in the 2-relay design.
    name: "Silvia Power Relay"
    id: silvia_power_relay
    lambda: 'return id(silvia_power_state);'
    turn_on_action:
      - lambda: |-
          id(silvia_power_state) = true;
          id(silvia_power_relay).publish_state(true);
      - script.execute: auto_off_timer
      - script.execute: status_led_update
      - script.execute: apply_pid_mode
    turn_off_action:
      - lambda: |-
          id(silvia_power_state) = false;
          id(brew_shot_running) = false;
          id(hot_water_running) = false;
          id(backflush_running) = false;
          id(silvia_power_relay).publish_state(false);
      - script.stop: run_active_shot_phase
      - script.stop: brew_shot_timer
      - script.stop: backflush_program
      - climate.control:
          id: silvia_brew_pid
          mode: "OFF"
      - output.set_level:
          id: silvia_pid_heat_output
          level: 0%
      - script.execute: pump_output_off
      - switch.turn_off: silvia_pump_relay
      - switch.turn_off: silvia_brew_valve_relay
      - script.stop: auto_off_timer
      - script.stop: status_led_blink_slow
      - script.stop: status_led_blink_fast
      - light.turn_off: silvia_status_led_light
      - lambda: |-
          id(auto_off_remaining_seconds) = 0;
          id(brew_shot_running) = false;
          id(brew_shot_phase) = 0;
          id(brew_shot_phase_end_ms) = 0;
          id(hot_water_running) = false;
          id(backflush_running) = false;
          id(silvia_brew_shot_remaining).publish_state(0);
          id(silvia_brew_shot_status).publish_state("Ожидание");

  - platform: gpio
    name: "Silvia Pump Relay"
    id: silvia_pump_relay
    restore_mode: ALWAYS_OFF
    pin:
      number: ${pump_relay_pin}
      inverted: false
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(silvia_power_state);'
          then:
            - switch.turn_off: silvia_pump_relay
          else:
            - script.execute: auto_off_timer
            - script.execute: status_led_update

  - platform: gpio
    name: "Silvia Brew Valve Relay"
    id: silvia_brew_valve_relay
    restore_mode: ALWAYS_OFF
    pin:
      number: ${brew_valve_relay_pin}
      inverted: false
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(silvia_power_state);'
          then:
            - switch.turn_off: silvia_brew_valve_relay
          else:
            - script.execute: auto_off_timer
            - script.execute: status_led_update

  - platform: template
    name: "Silvia Brew Shot"
    id: silvia_brew_shot_control
    lambda: 'return id(brew_shot_running);'
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(silvia_power_state) && !id(backflush_running);'
          then:
            - script.execute: auto_off_timer
            - script.execute: status_led_update
            - script.execute: brew_shot_timer
    turn_off_action:
      - lambda: 'id(brew_shot_running) = false;'
      - script.stop: run_active_shot_phase
      - script.stop: brew_shot_timer
      - script.execute: pump_output_off
      - script.execute: restore_manual_pump_settings
      - switch.turn_off: silvia_brew_valve_relay
      - lambda: |-
          id(brew_shot_running) = false;
          id(brew_shot_phase) = 0;
          id(brew_shot_phase_end_ms) = 0;
          id(silvia_brew_shot_remaining).publish_state(0);
          id(silvia_brew_shot_status).publish_state("Ожидание");

  - platform: template
    name: "Silvia Hot Water"
    id: silvia_hot_water_control
    lambda: 'return id(hot_water_running);'
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(silvia_power_state) && !id(backflush_running);'
          then:
            - script.execute: auto_off_timer
            - script.execute: status_led_update
            - lambda: 'id(hot_water_running) = true;'
            - script.execute: pump_output_on
    turn_off_action:
      - lambda: 'id(hot_water_running) = false;'
      - if:
          condition:
            lambda: 'return !id(brew_shot_running) && !id(backflush_running);'
          then:
            - script.execute: pump_output_off

  - platform: template
    name: "Silvia Steam Mode"
    id: silvia_steam_mode_control
    lambda: 'return id(silvia_pid_mode).current_option() == "Steam";'
    turn_on_action:
      - script.execute: auto_off_timer
      - script.execute: status_led_update
      - select.set:
          id: silvia_pid_mode
          option: "Steam"
    turn_off_action:
      - select.set:
          id: silvia_pid_mode
          option: "Brew"

