# -------------------------
# Автоотключение
# 0 минут = автоотключение выключено
# -------------------------

script:
  - id: restore_manual_pump_settings
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return ${use_pump_dimmer};'
          then:
            - lambda: |-
                id(silvia_pump_dimmer).set_ramp_ms((uint32_t) id(silvia_pump_ramp_ms).state);
                id(silvia_pump_dimmer).set_start_boost_ms(
                    id(silvia_pump_start_boost_enabled)
                        ? (uint32_t) id(silvia_pump_start_boost_ms).state
                        : 0);

  - id: pump_output_on
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return ${use_pump_dimmer};'
          then:
            - script.execute: restore_manual_pump_settings
            - output.set_level:
                id: silvia_pump_dimmer
                level: !lambda |-
                  float drive = id(silvia_manual_pump_power).state / 100.0f;
                  if (drive < 0.0f) drive = 0.0f;
                  if (drive > 1.00f) drive = 1.00f;
                  id(pump_dimmer_output_value) = drive;
                  return drive;
          else:
            - lambda: 'id(pump_dimmer_output_value) = 1.0f;'
            - switch.turn_on: silvia_pump_relay

  - id: pump_output_off
    mode: restart
    then:
      - lambda: |-
          id(active_target_brew_pressure) = 0.0f;
          id(pressure_profile_startup_settling_until_ms) = 0;
          id(silvia_pump_dimmer).cancel_timed_override();
      - if:
          condition:
            lambda: 'return ${use_pump_dimmer};'
          then:
            - lambda: 'id(pump_dimmer_output_value) = 0.0f;'
            - output.set_level:
                id: silvia_pump_dimmer
                level: 0%
          else:
            - lambda: 'id(pump_dimmer_output_value) = 0.0f;'
            - switch.turn_off: silvia_pump_relay

  - id: run_active_shot_phase
    mode: restart
    then:
      - lambda: |-
          const auto &phase = silvia::active_shot_phases[id(active_shot_phase_index)];
          id(pressure_control_integral) = 0.0f;
          if (phase.kind == silvia::ShotPhaseKind::PREFUSION) {
            id(brew_shot_phase) = 1;
          } else if (phase.kind == silvia::ShotPhaseKind::SOAK) {
            id(brew_shot_phase) = 2;
          } else {
            id(brew_shot_phase) = 3;
          }
          const int seconds = (int) ((phase.duration_ms + 999) / 1000);
          id(brew_shot_phase_end_ms) = millis() + phase.duration_ms;
          id(silvia_brew_shot_remaining).publish_state(seconds);
          id(silvia_brew_shot_status).publish_state(
              str_sprintf("%s: %d с", phase.status, seconds));
      - if:
          condition:
            lambda: |-
              return silvia::active_shot_phases[id(active_shot_phase_index)].pump_enabled;
          then:
            - if:
                condition:
                  lambda: 'return ${use_pump_dimmer};'
                then:
                  - lambda: |-
                      const auto &phase = silvia::active_shot_phases[id(active_shot_phase_index)];
                      id(silvia_pump_dimmer).set_start_boost_ms(
                          phase.mode != silvia::ShotControlMode::PRESSURE && phase.start_boost
                              ? id(active_pump_start_boost_ms)
                              : 0);
                      if (phase.mode == silvia::ShotControlMode::PRESSURE &&
                          id(pressure_profile_startup_boost_pending)) {
                        id(pressure_profile_startup_boost_pending) = false;
                        id(silvia_pump_dimmer).arm_timed_override(
                            id(active_pressure_profile_startup_boost_power) / 100.0f,
                            id(active_pressure_profile_startup_boost_ms));
                      }
                  - repeat:
                      count: !lambda |-
                        const auto &phase = silvia::active_shot_phases[id(active_shot_phase_index)];
                        return (int) silvia::phase_steps(phase);
                      then:
                        - if:
                            condition:
                              lambda: 'return id(brew_shot_running) && id(silvia_power_state);'
                            then:
                              - output.set_level:
                                  id: silvia_pump_dimmer
                                  level: !lambda |-
                                    const auto &phase = silvia::active_shot_phases[id(active_shot_phase_index)];
                                    const uint32_t steps = silvia::phase_steps(phase);
                                    float drive = 0.0f;
                                    if (phase.mode == silvia::ShotControlMode::POWER) {
                                      id(active_target_brew_pressure) = 0.0f;
                                      drive = silvia::phase_value(phase, iteration, steps);
                                    } else if (phase.mode == silvia::ShotControlMode::PRESSURE) {
                                      const uint32_t now = millis();
                                      const float pressure = id(silvia_brew_pressure).state;
                                      const float target = silvia::phase_target(
                                          phase, iteration, steps);
                                      id(active_target_brew_pressure) = target;
                                      const bool sensor_ok = id(silvia_brew_pressure).has_state() &&
                                          std::isfinite(pressure) && pressure >= -0.5f &&
                                          pressure <= 13.0f &&
                                          (now - id(pressure_sensor_last_update_ms)) <= 1000U;
                                      if (sensor_ok) {
                                        const float feed_forward =
                                            target > 0.0f ? 0.18f + target * 0.075f : 0.0f;
                                        const bool settling =
                                            id(active_pressure_profile_startup_settling_ms) > 0 &&
                                            static_cast<int32_t>(
                                                id(pressure_profile_startup_settling_until_ms) - now) > 0;
                                        if (settling) {
                                          id(pressure_control_integral) = 0.0f;
                                          drive = feed_forward;
                                        } else {
                                          const float error = target - pressure;
                                          const float kp = id(silvia_pressure_control_kp).state;
                                          const float ki = id(silvia_pressure_control_ki).state;
                                          float integral = id(pressure_control_integral);
                                          if (!id(silvia_pump_dimmer).timed_override_engaged()) {
                                            const float candidate_integral = std::max(
                                                -0.35f,
                                                std::min(0.35f, integral + error * ki * 0.2f));
                                            const float candidate_output =
                                                feed_forward + kp * error + candidate_integral;
                                            const bool pushes_high =
                                                candidate_output > 1.0f && error > 0.0f;
                                            const bool pushes_low =
                                                candidate_output < 0.0f && error < 0.0f;
                                            if (!pushes_high && !pushes_low) {
                                              integral = candidate_integral;
                                            }
                                          }
                                          drive = feed_forward + kp * error + integral;
                                          drive = std::max(0.0f, std::min(1.0f, drive));
                                          id(pressure_control_integral) = integral;
                                        }
                                      } else {
                                        id(pressure_control_integral) = 0.0f;
                                        drive = 0.0f;
                                      }
                                    }
                                    id(pump_dimmer_output_value) = drive;
                                    return drive;
                            else:
                              - script.execute: pump_output_off
                              - script.stop: run_active_shot_phase
                        - delay: 200ms
                else:
                  - if:
                      condition:
                        lambda: 'return id(brew_shot_running) && id(silvia_power_state);'
                      then:
                        - lambda: 'id(pump_dimmer_output_value) = 1.0f;'
                        - switch.turn_on: silvia_pump_relay
                        - delay: !lambda |-
                            return silvia::active_shot_phases[id(active_shot_phase_index)].duration_ms;
                      else:
                        - script.execute: pump_output_off
                        - script.stop: run_active_shot_phase
            - if:
                condition:
                  lambda: |-
                    const size_t current = (size_t) id(active_shot_phase_index);
                    const size_t next = current + 1;
                    return next >= silvia::active_shot_phases.size() ||
                           !silvia::active_shot_phases[next].pump_enabled;
                then:
                  - script.execute: pump_output_off
          else:
            - script.execute: pump_output_off
            - delay: !lambda |-
                return silvia::active_shot_phases[id(active_shot_phase_index)].duration_ms;

  - id: brew_shot_timer
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(silvia_power_state) && !id(backflush_running);'
          then:
            - lambda: |-
                const std::string profile = id(silvia_shot_profile).current_option();
                id(active_preinfusion_pump_seconds) = id(silvia_preinfusion_pump_seconds).state;
                id(active_preinfusion_pause_seconds) = id(silvia_preinfusion_pause_seconds).state;
                id(active_brew_shot_seconds) = id(silvia_brew_shot_seconds).state;
                id(active_preinfusion_pump_power) = id(silvia_preinfusion_pump_power).state;
                id(active_main_brew_pump_power) = id(silvia_main_brew_pump_power).state;
                id(active_end_brew_pump_power) = id(silvia_end_brew_pump_power).state;
                id(active_preinfusion_boost_enabled) = id(silvia_preinfusion_boost_enabled);
                id(active_main_brew_boost_enabled) = id(silvia_main_brew_boost_enabled);
                id(active_pump_start_boost_ms) = (uint32_t) id(silvia_pump_start_boost_ms).state;
                id(active_pressure_profile_startup_boost_enabled) =
                    id(silvia_pressure_profile_startup_boost_enabled);
                id(active_pressure_profile_startup_boost_power) =
                    id(silvia_pressure_profile_startup_boost_power).state;
                id(active_pressure_profile_startup_boost_ms) =
                    (uint32_t) id(silvia_pressure_profile_startup_boost_ms).state;
                id(active_pressure_profile_startup_settling_ms) =
                    (uint32_t) id(silvia_pressure_profile_startup_settling_ms).state;
                id(pressure_profile_startup_boost_pending) =
                    id(active_pressure_profile_startup_boost_enabled) &&
                    id(active_pressure_profile_startup_boost_ms) > 0;
                auto shot_profile = silvia::build_shot_profile(
                    profile,
                    id(active_preinfusion_pump_seconds),
                    id(active_preinfusion_pause_seconds),
                    id(active_brew_shot_seconds),
                    id(active_preinfusion_pump_power),
                    id(active_main_brew_pump_power),
                    id(active_end_brew_pump_power),
                    id(active_preinfusion_boost_enabled),
                    id(active_main_brew_boost_enabled));
                silvia::active_shot_phases = shot_profile.phases;
                id(brew_shot_running) = true;
                id(brew_shot_phase) = 0;
                id(brew_shot_phase_end_ms) = millis();
                id(hot_water_running) = false;
                id(silvia_brew_shot_remaining).publish_state(0);
                id(silvia_brew_shot_status).publish_state("Запуск");
            - switch.turn_on: silvia_brew_valve_relay
            - lambda: |-
                id(pressure_profile_startup_settling_until_ms) =
                    millis() + id(active_pressure_profile_startup_settling_ms);
            - if:
                condition:
                  lambda: 'return ${use_pump_dimmer};'
                then:
                  - lambda: |-
                      id(silvia_pump_dimmer).set_ramp_ms(0);
                      id(silvia_pump_dimmer).set_start_boost_ms(0);
            - repeat:
                count: !lambda |-
                  return (int) silvia::active_shot_phases.size();
                then:
                  - lambda: |-
                      id(active_shot_phase_index) = iteration;
                  - script.execute: run_active_shot_phase
                  - script.wait: run_active_shot_phase
            - script.execute: pump_output_off
            - script.execute: restore_manual_pump_settings
            - switch.turn_off: silvia_brew_valve_relay
            - lambda: |-
                id(brew_shot_running) = false;
                id(brew_shot_phase) = 0;
                id(brew_shot_phase_end_ms) = 0;
                id(silvia_brew_shot_remaining).publish_state(0);
                id(silvia_brew_shot_status).publish_state("Ожидание");
                id(backflush_shots)++;
                id(lifetime_shots)++;
                id(silvia_backflush_shots_sensor).publish_state(id(backflush_shots));
                id(silvia_lifetime_shots_sensor).publish_state(id(lifetime_shots));
                id(silvia_backflush_status).update();
          else:
            - lambda: |-
                id(brew_shot_running) = false;
                id(brew_shot_phase) = 0;
                id(brew_shot_phase_end_ms) = 0;
                id(silvia_brew_shot_remaining).publish_state(0);
                id(silvia_brew_shot_status).publish_state("Ожидание");

  - id: backflush_program
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return id(silvia_power_state) &&
                     !id(brew_shot_running) &&
                     !id(hot_water_running) &&
                     !id(backflush_running);
          then:
            - script.execute: auto_off_timer
            - script.execute: status_led_update
            - lambda: |-
                id(backflush_running) = true;
                id(backflush_stage) = 1;
                id(backflush_cycle) = 0;
                id(backflush_phase_end_ms) = 0;
                id(silvia_backflush_status).update();
            - script.execute: pump_output_off
            - switch.turn_off: silvia_brew_valve_relay
            - repeat:
                count: 8
                then:
                  - lambda: |-
                      id(backflush_cycle)++;
                      id(silvia_backflush_status).update();
                  - switch.turn_on: silvia_brew_valve_relay
                  - script.execute: pump_output_on
                  - delay: 5s
                  - script.execute: pump_output_off
                  - switch.turn_off: silvia_brew_valve_relay
                  - delay: 10s
            - lambda: |-
                const int seconds = (int) (id(silvia_backflush_rinse_delay_seconds).state + 0.999f);
                id(backflush_stage) = 2;
                id(backflush_cycle) = seconds;
                id(backflush_phase_end_ms) =
                    millis() + (uint32_t) (id(silvia_backflush_rinse_delay_seconds).state * 1000.0f);
                id(silvia_backflush_status).update();
            - delay: !lambda |-
                return (uint32_t)(id(silvia_backflush_rinse_delay_seconds).state * 1000.0f);
            - lambda: |-
                id(backflush_stage) = 3;
                id(backflush_cycle) = 0;
                id(backflush_phase_end_ms) = 0;
                id(silvia_backflush_status).update();
            - script.execute: pump_output_off
            - switch.turn_off: silvia_brew_valve_relay
            - repeat:
                count: 8
                then:
                  - lambda: |-
                      id(backflush_cycle)++;
                      id(silvia_backflush_status).update();
                  - switch.turn_on: silvia_brew_valve_relay
                  - script.execute: pump_output_on
                  - delay: 5s
                  - script.execute: pump_output_off
                  - switch.turn_off: silvia_brew_valve_relay
                  - delay: 10s
            - lambda: |-
                id(backflush_shots) = 0;
                id(backflush_running) = false;
                id(backflush_stage) = 0;
                id(backflush_cycle) = 0;
                id(backflush_phase_end_ms) = 0;
                id(silvia_backflush_shots_sensor).publish_state(id(backflush_shots));
                id(silvia_backflush_status).update();
            - script.execute: status_led_update
          else:
            - logger.log: "Silvia backflush blocked: machine is busy or power is OFF"

  - id: auto_off_timer
    mode: restart
    then:
      - lambda: |-
          if (id(silvia_auto_off_minutes).state <= 0) {
            id(auto_off_remaining_seconds) = 0;
          } else {
            id(auto_off_remaining_seconds) = (int)(id(silvia_auto_off_minutes).state * 60.0f);
          }
      - script.execute: status_led_update

      - if:
          condition:
            lambda: 'return id(silvia_auto_off_minutes).state > 0;'
          then:
            - while:
                condition:
                  lambda: |-
                    return id(silvia_power_state) &&
                           id(auto_off_remaining_seconds) > 0 &&
                           id(silvia_auto_off_minutes).state > 0;
                then:
                  - delay: 1s
                  - lambda: |-
                      id(auto_off_remaining_seconds)--;

                  - if:
                      condition:
                        lambda: 'return id(auto_off_remaining_seconds) == 60;'
                      then:
                        - script.execute: status_led_update

            - if:
                condition:
                  lambda: |-
                    return id(silvia_power_state) &&
                           id(auto_off_remaining_seconds) <= 0 &&
                           id(silvia_auto_off_minutes).state > 0;
                then:
                  - switch.turn_off: silvia_power_relay

  - id: status_led_update
    mode: restart
    then:
      - script.stop: status_led_blink_slow
      - script.stop: status_led_blink_fast

      - if:
          condition:
            lambda: 'return !id(silvia_power_state);'
          then:
            - light.turn_off: silvia_status_led_light
          else:
            - if:
                condition:
                  lambda: 'return id(silvia_auto_off_minutes).state <= 0;'
                then:
                  - light.turn_on: silvia_status_led_light
                else:
                  - if:
                      condition:
                        lambda: 'return id(auto_off_remaining_seconds) > 0 && id(auto_off_remaining_seconds) <= 60;'
                      then:
                        - script.execute: status_led_blink_fast
                      else:
                        - script.execute: status_led_blink_slow

  - id: status_led_blink_slow
    mode: restart
    then:
      - while:
          condition:
            lambda: |-
              return id(silvia_power_state) &&
                     id(silvia_auto_off_minutes).state > 0 &&
                     id(auto_off_remaining_seconds) > 60;
          then:
            - light.turn_on: silvia_status_led_light
            - delay: 1s
            - light.turn_off: silvia_status_led_light
            - delay: 2s

  - id: status_led_blink_fast
    mode: restart
    then:
      - while:
          condition:
            lambda: |-
              return id(silvia_power_state) &&
                     id(silvia_auto_off_minutes).state > 0 &&
                     id(auto_off_remaining_seconds) > 0 &&
                     id(auto_off_remaining_seconds) <= 60;
          then:
            - light.turn_on: silvia_status_led_light
            - delay: 300ms
            - light.turn_off: silvia_status_led_light
            - delay: 300ms

  - id: apply_pid_parameters
    mode: restart
    then:
      - climate.pid.set_control_parameters:
          id: silvia_brew_pid
          kp: !lambda 'return id(silvia_pid_kp).state;'
          ki: !lambda 'return id(silvia_pid_ki).state;'
          kd: !lambda 'return id(silvia_pid_kd).state;'

  - id: apply_pid_mode
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(silvia_pid_mode).current_option() == "Brew";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'

      - if:
          condition:
            lambda: 'return id(silvia_pid_mode).current_option() == "Steam";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'

          
# -------------------------
# Кнопки в Home Assistant
# -------------------------

button:
  - platform: restart
    name: "Silvia ESP Restart"

  - platform: template
    name: "Silvia Reset Auto Off Timer"
    on_press:
      - if:
          condition:
            lambda: 'return id(silvia_power_state);'
          then:
            - script.execute: auto_off_timer

  - platform: template
    name: "Silvia PID Autotune"
    on_press:
      - if:
          condition:
            lambda: 'return id(silvia_power_state);'
          then:
            - logger.log: "Silvia PID autotune started"
            - lambda: |-
                id(pid_autotune_running) = true;
                id(pid_autotune_status) = 1;
                id(pid_autotune_elapsed_seconds) = 0;
                id(silvia_pid_autotune_status).publish_state("Running | starting");

            - climate.pid.set_control_parameters:
                id: silvia_brew_pid
                kp: 0.0
                ki: 0.0
                kd: 0.0

            # Запускаем autotune
            - climate.pid.autotune:
                id: silvia_brew_pid
                noiseband: 0.25
                positive_output: 1.0
                negative_output: 0.0
          else:
            - logger.log: "Silvia PID autotune blocked: machine power is OFF"
            - lambda: |-
                id(pid_autotune_status) = 3;
                id(silvia_pid_autotune_status).publish_state("Blocked | machine power is OFF");

  - platform: template
    name: "Silvia Start Backflush"
    on_press:
      - script.execute: backflush_program

  - platform: template
    name: "Silvia Stop Backflush"
    on_press:
      - script.stop: backflush_program
      - script.execute: pump_output_off
      - switch.turn_off: silvia_brew_valve_relay
      - lambda: |-
          id(backflush_running) = false;
          id(backflush_stage) = 0;
          id(backflush_cycle) = 0;
          id(backflush_phase_end_ms) = 0;
          id(silvia_backflush_status).update();
      - script.execute: status_led_update

  - platform: template
    name: "Silvia Reset Backflush Shots"
    on_press:
      - lambda: |-
          id(backflush_shots) = 0;
          id(silvia_backflush_shots_sensor).publish_state(id(backflush_shots));
          id(silvia_backflush_status).update();

# -------------------------
# Статусы
# -------------------------
sensor:
  - platform: xdb401
    address: 0x7F
    pressure_range_bar: 10
    update_interval: 100ms
    pressure:
      name: "Silvia Brew Pressure"
      id: silvia_brew_pressure
      unit_of_measurement: "bar"
      accuracy_decimals: 1
      filters:
        # XDB301/XDB401 0-1.2 MPa: Pa -> bar with 12 bar full scale.
        - multiply: 0.000012
        - exponential_moving_average:
            alpha: 0.35
            send_every: 1
      on_value:
        then:
          - lambda: 'id(pressure_sensor_last_update_ms) = millis();'
    temperature:
      name: "Silvia Pressure Sensor Temperature"
      id: silvia_pressure_sensor_temperature
      accuracy_decimals: 1

  - platform: template
    name: "Silvia PID Heat Output"
    id: silvia_pid_heat_output_percent
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      return id(pid_heat_output_value) * 100.0f;

  - platform: template
    name: "Silvia Pump Dimmer Output"
    id: silvia_pump_dimmer_output_percent
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 200ms
    lambda: |-
      return id(pump_dimmer_output_value) * 100.0f;

  - platform: template
    name: "Silvia Target Brew Pressure"
    id: silvia_target_brew_pressure
    unit_of_measurement: "bar"
    device_class: pressure
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 200ms
    lambda: |-
      return id(active_target_brew_pressure);

  - platform: template
    name: "Silvia Auto Off Remaining"
    id: silvia_auto_off_remaining
    unit_of_measurement: "min"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(auto_off_remaining_seconds) / 60.0f;

  - platform: template
    name: "Silvia Brew Shot Remaining"
    id: silvia_brew_shot_remaining
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    name: "Silvia Backflush Shots"
    id: silvia_backflush_shots_sensor
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      return id(backflush_shots);

  - platform: template
    name: "Silvia Lifetime Shots"
    id: silvia_lifetime_shots_sensor
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      return id(lifetime_shots);

  - platform: template
    name: "Silvia Coffee Grounds Used"
    id: silvia_coffee_grounds_used
    unit_of_measurement: "g"
    state_class: total_increasing
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      return id(lifetime_shots) * id(silvia_coffee_dose_grams).state;

  - platform: template
    name: "Silvia Brew Target Sensor"
    id: silvia_brew_target_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      return id(silvia_brew_target).state;

  - platform: template
    name: "Silvia Steam Target Sensor"
    id: silvia_steam_target_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      return id(silvia_steam_target).state;

  - platform: template
    name: "Silvia Active Target"
    id: silvia_active_target
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      if (id(silvia_pid_mode).current_option() == "Steam") {
        return id(silvia_steam_target).state;
      }
      return id(silvia_brew_target).state;

  - platform: template
    name: "Silvia Estimated Brew Temperature"
    id: silvia_estimated_brew_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      if (!id(silvia_boiler_temp_pt100).has_state()) {
        return NAN;
      }
      return id(silvia_boiler_temp_pt100).state -
             id(silvia_brew_temperature_offset).state;

  - platform: template
    name: "Silvia Estimated Brew Target"
    id: silvia_estimated_brew_target
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(silvia_brew_target).state;

  - platform: template
    name: "Silvia Brew Boiler Target"
    id: silvia_brew_boiler_target
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(silvia_brew_target).state +
             id(silvia_brew_temperature_offset).state;

  # PID uses the estimated water temperature for brewing and the raw
  # boiler temperature for steam. Hardware protection always uses PT100.
  - platform: template
    id: silvia_pid_control_temperature
    internal: true
    update_interval: 1s
    lambda: |-
      if (!id(silvia_boiler_temp_pt100).has_state()) {
        return NAN;
      }
      if (id(silvia_pid_mode).current_option() == "Steam") {
        return id(silvia_boiler_temp_pt100).state;
      }
      return id(silvia_boiler_temp_pt100).state -
             id(silvia_brew_temperature_offset).state;

  - platform: max31865
    name: "Silvia Boiler Temperature PT100"
    id: silvia_boiler_temp_pt100
    cs_pin: ${max31865_cs_pin}
    reference_resistance: 430 Ω
    rtd_nominal_resistance: 100 Ω
    rtd_wires: 3
    mains_filter: 50Hz
    update_interval: 1s
    accuracy_decimals: 1
    on_value_range:
      - above: ${overtemp_limit}
        then:
          - logger.log:
              level: ERROR
              format: "Silvia overtemperature: heater and machine power disabled"
          - climate.control:
              id: silvia_brew_pid
              mode: "OFF"
          - output.set_level:
              id: silvia_pid_heat_output
              level: 0%
          - switch.turn_off: silvia_pump_relay
          - switch.turn_off: silvia_brew_valve_relay
          - switch.turn_off: silvia_power_relay

      
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Silvia ESP IP"

  - platform: debug
    reset_reason:
      name: "Silvia Reset Reason"

  - platform: template
    name: "Silvia Power Status"
    lambda: |-
      if (id(silvia_power_state)) {
        return {"ON"};
      } else {
        return {"OFF"};
      }

  - platform: template
    name: "Silvia Auto Off Status"
    update_interval: 5s
    lambda: |-
      if (!id(silvia_power_state)) {
        return {"OFF"};
      }
      if (id(silvia_auto_off_minutes).state <= 0) {
        return {"Auto-off disabled"};
      }
      return {"Auto-off active"};

  - platform: template
    name: "Silvia Brew Shot Status"
    id: silvia_brew_shot_status
    icon: "mdi:timer-sand"
    update_interval: never

  - platform: template
    name: "Silvia Shot Profile Preview"
    id: silvia_shot_profile_preview
    icon: "mdi:sine-wave"
    update_interval: 10s
    lambda: |-
      const std::string profile = id(silvia_shot_profile).current_option();
      if (profile == "Classic") {
        return {"Classic | без предсмачивания | 9.0 bar"};
      }
      if (profile == "Lever") {
        return {str_sprintf(
            "Lever | %.0fs %.1f bar | %.0fs: %.1f -> %.1f bar",
            id(silvia_preinfusion_pump_seconds).state,
            id(silvia_preinfusion_pump_power).state,
            id(silvia_brew_shot_seconds).state,
            id(silvia_main_brew_pump_power).state,
            id(silvia_end_brew_pump_power).state)};
      }
      if (profile == "Slayer Style") {
        return {str_sprintf(
            "Slayer | %.0fs %.1f bar | %.0fs: %.1f -> %.1f bar",
            id(silvia_preinfusion_pump_seconds).state,
            id(silvia_preinfusion_pump_power).state,
            id(silvia_brew_shot_seconds).state,
            id(silvia_main_brew_pump_power).state,
            id(silvia_end_brew_pump_power).state)};
      }
      if (profile == "Bloom") {
        return {str_sprintf(
            "Bloom | %.0fs %.1f bar + %.0fs soak | %.1f -> %.1f bar",
            id(silvia_preinfusion_pump_seconds).state,
            id(silvia_preinfusion_pump_power).state,
            id(silvia_preinfusion_pause_seconds).state,
            id(silvia_main_brew_pump_power).state,
            id(silvia_end_brew_pump_power).state)};
      }
      return {str_sprintf(
          "Custom | %.0fs %.1f bar | %.0fs soak | %.0fs: %.1f -> %.1f bar",
          id(silvia_preinfusion_pump_seconds).state,
          id(silvia_preinfusion_pump_power).state,
          id(silvia_preinfusion_pause_seconds).state,
          id(silvia_brew_shot_seconds).state,
          id(silvia_main_brew_pump_power).state,
          id(silvia_end_brew_pump_power).state)};

  - platform: template
    name: "Silvia Water Status"
    update_interval: 2s
    lambda: |-
      if (id(silvia_water_level).state) {
        return {"Water OK"};
      } else {
        return {"Water LOW"};
      }

  - platform: template
    name: "Silvia Backflush Status"
    id: silvia_backflush_status
    update_interval: 10s
    lambda: |-
      if (id(backflush_running)) {
        if (id(backflush_stage) == 1) {
          return {str_sprintf("Cleaning | %d/8 cycles", id(backflush_cycle))};
        }
        if (id(backflush_stage) == 3) {
          return {str_sprintf("Rinsing | %d/8 cycles", id(backflush_cycle))};
        }
        if (id(backflush_stage) == 2) {
          return {str_sprintf("Prepare rinse | %d s", id(backflush_cycle))};
        }
        return {"Backflush running"};
      }
      const int shots = id(backflush_shots);
      const float reminder_state = id(silvia_backflush_reminder_shots).state;
      if (!std::isfinite(reminder_state)) {
        return {"OK"};
      }
      const int reminder = (int) reminder_state;
      if (reminder <= 0) {
        return {"Reminder disabled"};
      }
      if (shots >= reminder) {
        return {str_sprintf("Backflush due | %d/%d shots", shots, reminder)};
      }
      return {str_sprintf("OK | %d/%d shots", shots, reminder)};

  - platform: template
    name: "Silvia PID Autotune Status"
    id: silvia_pid_autotune_status
    update_interval: 2s
    lambda: |-
      if (id(pid_autotune_running)) {
        const int minutes = id(pid_autotune_elapsed_seconds) / 60;
        const int seconds = id(pid_autotune_elapsed_seconds) % 60;

        if (!id(silvia_power_state)) {
          return {str_sprintf("Running | heater disabled | %02d:%02d", minutes, seconds)};
        }

        return {str_sprintf(
            "Running | %02d:%02d | %.1f/%.1f C | %.1f%%",
            minutes,
            seconds,
            id(silvia_boiler_temp_pt100).state,
            id(silvia_brew_pid).target_temperature,
            id(pid_heat_output_value) * 100.0f)};
      }

      if (id(pid_autotune_status) == 2) {
        return {str_sprintf(
            "Completed | KP %.5f | KI %.5f | KD %.5f",
            id(silvia_pid_kp).state,
            id(silvia_pid_ki).state,
            id(silvia_pid_kd).state)};
      }

      if (id(pid_autotune_status) == 3) {
        return {"Blocked | machine power is OFF"};
      }

      return {"Idle"};

output:
  - platform: gpio
    id: silvia_status_led
    pin:
      number: ${led_pin}
      inverted: false

  # Реальный PWM-выход на SSR нагревателя
  - platform: slow_pwm
    id: silvia_heater_ssr_pwm
    pin: ${heater_ssr_pin}
    period: 1s

  # RobotDyn/Robotron AC dimmer in full-cycle skip mode for pump tests.
  # Percent means the share of full mains periods passed to the pump.
  - platform: ac_cycle_skip
    id: silvia_pump_dimmer
    gate_pin: ${pump_dimmer_gate_pin}
    min_power: 0%
    max_power: 100%
    zero_means_zero: true
    noise_filter_us: 5000
    min_zero_cross_interval_us: 6000
    max_zero_cross_interval_us: 13000
    gate_delay_us: 100
    gate_pulse_us: 300
    start_boost_ms: 0
    ramp_ms: 800
    zero_cross_pin:
      number: ${pump_dimmer_zero_cross_pin}
      mode:
        input: true

  # PID пишет сюда.
  # Сохраняем процент для HA и передаём его в SSR.
  - platform: template
    id: silvia_pid_heat_output
    type: float
    write_action:
      - lambda: |-
          float level = state;
          const float temperature = id(silvia_boiler_temp_pt100).state;

          // Never energize the heater while logical power is off, with an invalid
          // reading, or above the safety limit.
          if (!id(silvia_power_state) ||
              !id(silvia_boiler_temp_pt100).has_state() ||
              !std::isfinite(temperature) ||
              temperature >= ${overtemp_limit}f) {
            level = 0.0f;
          }

          // Убираем микромигание около 0% и 100%
          if (level >= 0.995f) {
            level = 1.0f;
          } else if (level <= 0.005f) {
            level = 0.0f;
          }

          id(pid_heat_output_value) = level;
          id(silvia_heater_ssr_pwm).set_level(level);

light:
  - platform: binary
    name: "Silvia Status LED"
    id: silvia_status_led_light
    output: silvia_status_led



climate:
  - platform: pid
    name: "Silvia Brew PID"
    id: silvia_brew_pid
    sensor: silvia_pid_control_temperature
    default_target_temperature: 93°C
    heat_output: silvia_pid_heat_output

    control_parameters:
      kp: 0.12492
      ki: 0.00065
      kd: 6.00246

    visual:
      min_temperature: 80°C
      max_temperature: 150°C
      temperature_step: 0.5°C

    on_control:
      - if:
          condition:
            lambda: |-
              if (!x.get_target_temperature().has_value()) return false;
              float target = x.get_target_temperature().value();
              return id(silvia_pid_mode).current_option() == "Brew" &&
                     fabs(id(silvia_brew_target).state - target) > 0.05;
          then:
            - number.set:
                id: silvia_brew_target
                value: !lambda |-
                  return x.get_target_temperature().value();

      - if:
          condition:
            lambda: |-
              if (!x.get_target_temperature().has_value()) return false;
              float target = x.get_target_temperature().value();
              return id(silvia_pid_mode).current_option() == "Steam" &&
                     fabs(id(silvia_steam_target).state - target) > 0.05;
          then:
            - number.set:
                id: silvia_steam_target
                value: !lambda |-
                  return x.get_target_temperature().value();

      
select:
  - platform: template
    name: "Silvia Shot Profile"
    id: silvia_shot_profile
    optimistic: true
    restore_value: true
    options:
      - "Classic"
      - "Lever"
      - "Slayer Style"
      - "Bloom"
      - "Custom"
    initial_option: "Classic"
    set_action:
      - lambda: 'id(shot_profile_applying) = true;'
      - if:
          condition:
            lambda: 'return x == "Classic";'
          then:
            - number.set:
                id: silvia_preinfusion_pump_seconds
                value: 0
            - number.set:
                id: silvia_preinfusion_pause_seconds
                value: 0
            - number.set:
                id: silvia_brew_shot_seconds
                value: 25
            - number.set:
                id: silvia_preinfusion_pump_power
                value: 3.0
            - number.set:
                id: silvia_main_brew_pump_power
                value: 9.0
            - number.set:
                id: silvia_end_brew_pump_power
                value: 9.0
            - switch.turn_off: silvia_preinfusion_boost
            - switch.turn_off: silvia_main_brew_boost
      - if:
          condition:
            lambda: 'return x == "Lever";'
          then:
            - number.set:
                id: silvia_preinfusion_pump_seconds
                value: 4
            - number.set:
                id: silvia_preinfusion_pause_seconds
                value: 0
            - number.set:
                id: silvia_brew_shot_seconds
                value: 25
            - number.set:
                id: silvia_preinfusion_pump_power
                value: 3.0
            - number.set:
                id: silvia_main_brew_pump_power
                value: 9.0
            - number.set:
                id: silvia_end_brew_pump_power
                value: 6.0
            - switch.turn_off: silvia_preinfusion_boost
            - switch.turn_off: silvia_main_brew_boost
      - if:
          condition:
            lambda: 'return x == "Slayer Style";'
          then:
            - number.set:
                id: silvia_preinfusion_pump_seconds
                value: 8
            - number.set:
                id: silvia_preinfusion_pause_seconds
                value: 0
            - number.set:
                id: silvia_brew_shot_seconds
                value: 25
            - number.set:
                id: silvia_preinfusion_pump_power
                value: 2.0
            - number.set:
                id: silvia_main_brew_pump_power
                value: 9.0
            - number.set:
                id: silvia_end_brew_pump_power
                value: 7.0
            - switch.turn_off: silvia_preinfusion_boost
            - switch.turn_off: silvia_main_brew_boost
      - if:
          condition:
            lambda: 'return x == "Bloom";'
          then:
            - number.set:
                id: silvia_preinfusion_pump_seconds
                value: 5
            - number.set:
                id: silvia_preinfusion_pause_seconds
                value: 8
            - number.set:
                id: silvia_brew_shot_seconds
                value: 25
            - number.set:
                id: silvia_preinfusion_pump_power
                value: 3.0
            - number.set:
                id: silvia_main_brew_pump_power
                value: 9.0
            - number.set:
                id: silvia_end_brew_pump_power
                value: 8.0
            - switch.turn_off: silvia_preinfusion_boost
            - switch.turn_off: silvia_main_brew_boost
      - lambda: 'id(shot_profile_applying) = false;'
      - component.update: silvia_shot_profile_preview

  - platform: template
    name: "Silvia PID Mode"
    id: silvia_pid_mode
    optimistic: true
    restore_value: true
    options:
      - "Brew"
      - "Steam"
    initial_option: "Brew"
    set_action:
      - if:
          condition:
            lambda: 'return x == "Brew";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'

      - if:
          condition:
            lambda: 'return x == "Steam";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'
