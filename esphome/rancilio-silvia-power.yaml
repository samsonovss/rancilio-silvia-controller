esphome:
  name: rancilio-silvia-power
  friendly_name: Rancilio Silvia Power
  on_boot:
    - priority: 800
      then:
        - switch.turn_off: silvia_pump_relay
        - switch.turn_off: silvia_brew_valve_relay
        - switch.turn_off: silvia_power_relay
        - lambda: |-
            id(auto_off_remaining_seconds) = 0;
    - priority: -100
      then:
        - script.execute: apply_pid_parameters
        - lambda: |-
            id(silvia_pump_dimmer).set_start_boost_ms(
                id(silvia_pump_start_boost_enabled) ? (uint32_t) id(silvia_pump_start_boost_ms).state : 0);
            id(silvia_pump_dimmer).set_ramp_ms((uint32_t) id(silvia_pump_ramp_ms).state);
            id(silvia_pump_dimmer).set_gate_delay_us((uint32_t) id(silvia_pump_gate_delay_us).state);
            id(silvia_pump_dimmer).set_gate_pulse_us((uint32_t) id(silvia_pump_gate_pulse_us).state);
            id(silvia_brew_shot_remaining).publish_state(0);
            id(silvia_brew_shot_status).publish_state("Ожидание");
            id(silvia_backflush_status).update();

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_GPTIMER_ISR_CACHE_SAFE: "y"
      CONFIG_GPTIMER_CTRL_FUNC_IN_IRAM: "y"
      CONFIG_GPTIMER_ISR_HANDLER_IN_IRAM: "y"

logger:
  level: INFO

web_server:
  port: 80

api:
  reboot_timeout: 0s

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Silvia Fallback"
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source:
      type: local
      path: components



spi:
  clk_pin: GPIO18
  miso_pin: GPIO16
  mosi_pin: GPIO8

# -------------------------
# GPIO настройки
# -------------------------

substitutions:
  button_pin: GPIO4
  led_pin: GPIO47
  heater_ssr_pin: GPIO13
  brew_button_pin: GPIO21
  hot_water_button_pin: GPIO10
  steam_mode_button_pin: GPIO9
  pump_relay_pin: GPIO15
  brew_valve_relay_pin: GPIO41
  max31865_cs_pin: GPIO17
  water_level_pin: GPIO5
  pump_dimmer_gate_pin: GPIO6
  pump_dimmer_zero_cross_pin: GPIO7
  hx711_dout_pin: GPIO38
  hx711_clk_pin: GPIO48
  xdb401_sda_pin: GPIO11
  xdb401_scl_pin: GPIO12
  use_pump_dimmer: "true"
  overtemp_limit: "155.0"
  # Future Nextion display placeholder. Keep commented until wired and tested.
  # nextion_tx_pin: GPIO1
  # nextion_rx_pin: GPIO2

# -------------------------
# Внутренние переменные
# -------------------------

globals:
  - id: silvia_power_state
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: auto_off_remaining_seconds
    type: int
    restore_value: no
    initial_value: '0'

  - id: pid_heat_output_value
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: pump_dimmer_output_value
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: silvia_pump_start_boost_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: pid_autotune_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: pid_autotune_status
    type: int
    restore_value: no
    initial_value: '0'

  - id: pid_autotune_elapsed_seconds
    type: int
    restore_value: no
    initial_value: '0'

  - id: brew_profile_applying
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: brew_shot_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: brew_shot_phase
    type: int
    restore_value: no
    initial_value: '0'

  - id: brew_shot_phase_end_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: hot_water_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: backflush_shots
    type: int
    restore_value: yes
    initial_value: '0'

  - id: lifetime_shots
    type: int
    restore_value: yes
    initial_value: '0'

  - id: backflush_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: backflush_stage
    type: int
    restore_value: no
    initial_value: '0'

  - id: backflush_cycle
    type: int
    restore_value: no
    initial_value: '0'

  - id: backflush_phase_end_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (!id(pid_autotune_running)) {
            return;
          }

          id(pid_autotune_elapsed_seconds)++;

          const float kp = id(silvia_brew_pid).get_kp();
          const float ki = id(silvia_brew_pid).get_ki();
          const float kd = id(silvia_brew_pid).get_kd();

          if (std::isfinite(kp) && std::isfinite(ki) && std::isfinite(kd) &&
              (kp > 0.0f || ki > 0.0f || kd > 0.0f)) {
            auto kp_call = id(silvia_pid_kp).make_call();
            kp_call.set_value(kp);
            kp_call.perform();

            auto ki_call = id(silvia_pid_ki).make_call();
            ki_call.set_value(ki);
            ki_call.perform();

            auto kd_call = id(silvia_pid_kd).make_call();
            kd_call.set_value(kd);
            kd_call.perform();

            id(pid_autotune_running) = false;
            id(pid_autotune_status) = 2;
            id(silvia_pid_autotune_status).publish_state(
                str_sprintf("Completed | KP %.5f | KI %.5f | KD %.5f", kp, ki, kd));
            ESP_LOGI("silvia.pid", "Autotune saved: KP %.5f, KI %.5f, KD %.5f", kp, ki, kd);
          }

      - lambda: |-
          if (!id(brew_shot_running)) {
            return;
          }

          const int32_t remaining_ms = (int32_t) (id(brew_shot_phase_end_ms) - millis());
          const int remaining_seconds = remaining_ms > 0 ? (remaining_ms + 999) / 1000 : 0;
          const char *phase = "Пролив";

          if (id(brew_shot_phase) == 1) {
            phase = "Предсмачивание";
          } else if (id(brew_shot_phase) == 2) {
            phase = "Пауза";
          }

          id(silvia_brew_shot_remaining).publish_state(remaining_seconds);
          id(silvia_brew_shot_status).publish_state(
              str_sprintf("%s: %d с", phase, remaining_seconds));

      - lambda: |-
          if (!id(backflush_running) || id(backflush_stage) != 2) {
            return;
          }

          const int32_t remaining_ms = (int32_t) (id(backflush_phase_end_ms) - millis());
          id(backflush_cycle) = remaining_ms > 0 ? (remaining_ms + 999) / 1000 : 0;
          id(silvia_backflush_status).update();
    
# -------------------------
# Настраиваемые параметры в HA
# -------------------------

number:
  - platform: template
    name: "Silvia Auto Off Minutes"
    id: silvia_auto_off_minutes
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 0
    max_value: 180
    step: 5
    unit_of_measurement: "min"
    mode: slider
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(silvia_power_state);'
            then:
              - script.execute: auto_off_timer
              - script.execute: status_led_update

  - platform: template
    name: "Silvia PID KP"
    id: silvia_pid_kp
    optimistic: true
    restore_value: true
    initial_value: 0.12492
    min_value: 0.0
    max_value: 50.0
    step: 0.00001
    mode: box
    on_value:
      then:
        - script.execute: apply_pid_parameters

  - platform: template
    name: "Silvia PID KI"
    id: silvia_pid_ki
    optimistic: true
    restore_value: true
    initial_value: 0.00065
    min_value: 0.0
    max_value: 5.0
    step: 0.00001
    mode: box
    on_value:
      then:
        - script.execute: apply_pid_parameters

  - platform: template
    name: "Silvia PID KD"
    id: silvia_pid_kd
    optimistic: true
    restore_value: true
    initial_value: 6.00246
    min_value: 0.0
    max_value: 100.0
    step: 0.00001
    mode: box
    on_value:
      then:
        - script.execute: apply_pid_parameters

  - platform: template
    name: "Silvia Brew Temperature Offset"
    id: silvia_brew_temperature_offset
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: -20
    max_value: 30
    step: 0.1
    unit_of_measurement: "°C"
    mode: box
    on_value:
      then:
        - component.update: silvia_pid_control_temperature

  - platform: template
    name: "Silvia Brew Shot Seconds"
    id: silvia_brew_shot_seconds
    optimistic: true
    restore_value: true
    initial_value: 25
    min_value: 1
    max_value: 90
    step: 0.5
    unit_of_measurement: "s"
    mode: box
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(brew_profile_applying) && id(silvia_brew_profile).current_option() != "Custom";'
            then:
              - select.set:
                  id: silvia_brew_profile
                  option: "Custom"

  - platform: template
    name: "Silvia Preinfusion Pump Seconds"
    id: silvia_preinfusion_pump_seconds
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 10
    step: 0.5
    unit_of_measurement: "s"
    mode: box
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(brew_profile_applying) && id(silvia_brew_profile).current_option() != "Custom";'
            then:
              - select.set:
                  id: silvia_brew_profile
                  option: "Custom"

  - platform: template
    name: "Silvia Preinfusion Pause Seconds"
    id: silvia_preinfusion_pause_seconds
    optimistic: true
    restore_value: true
    initial_value: 0
    min_value: 0
    max_value: 20
    step: 0.5
    unit_of_measurement: "s"
    mode: box
    on_value:
      then:
        - if:
            condition:
              lambda: 'return !id(brew_profile_applying) && id(silvia_brew_profile).current_option() != "Custom";'
            then:
              - select.set:
                  id: silvia_brew_profile
                  option: "Custom"

  - platform: template
    name: "Silvia Manual Pump Power"
    id: silvia_manual_pump_power
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 0
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    mode: slider
    on_value:
      then:
        - component.update: silvia_pump_profile_preview

  - platform: template
    name: "Silvia Pump Ramp Time"
    id: silvia_pump_ramp_ms
    optimistic: true
    restore_value: true
    initial_value: 800
    min_value: 0
    max_value: 3000
    step: 50
    unit_of_measurement: "ms"
    mode: box
    on_value:
      then:
        - lambda: |-
            id(silvia_pump_dimmer).set_ramp_ms((uint32_t) x);

  - platform: template
    name: "Silvia Pump Start Boost Time"
    id: silvia_pump_start_boost_ms
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 0
    max_value: 1000
    step: 10
    unit_of_measurement: "ms"
    mode: box
    on_value:
      then:
        - lambda: |-
            id(silvia_pump_dimmer).set_start_boost_ms(
                id(silvia_pump_start_boost_enabled) ? (uint32_t) x : 0);

  - platform: template
    name: "Silvia Pump Gate Delay"
    id: silvia_pump_gate_delay_us
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 10
    max_value: 1000
    step: 10
    unit_of_measurement: "us"
    mode: box
    on_value:
      then:
        - lambda: |-
            id(silvia_pump_dimmer).set_gate_delay_us((uint32_t) x);

  - platform: template
    name: "Silvia Pump Gate Pulse"
    id: silvia_pump_gate_pulse_us
    optimistic: true
    restore_value: true
    initial_value: 300
    min_value: 50
    max_value: 1000
    step: 10
    unit_of_measurement: "us"
    mode: box
    on_value:
      then:
        - lambda: |-
            id(silvia_pump_dimmer).set_gate_pulse_us((uint32_t) x);

  - platform: template
    name: "Silvia Brew Target"
    id: silvia_brew_target
    optimistic: true
    restore_value: true
    initial_value: 93
    min_value: 80
    max_value: 105
    step: 0.5
    unit_of_measurement: "°C"
    mode: box
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(silvia_pid_mode).current_option() == "Brew";'
            then:
              - script.execute: apply_pid_mode

  - platform: template
    name: "Silvia Steam Target"
    id: silvia_steam_target
    optimistic: true
    restore_value: true
    initial_value: 140
    min_value: 120
    max_value: 150
    step: 1
    unit_of_measurement: "°C"
    mode: box
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(silvia_pid_mode).current_option() == "Steam";'
            then:
              - script.execute: apply_pid_mode

  - platform: template
    name: "Silvia Backflush Reminder Shots"
    id: silvia_backflush_reminder_shots
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 0
    max_value: 150
    step: 1
    mode: box

  - platform: template
    name: "Silvia Backflush Rinse Delay Seconds"
    id: silvia_backflush_rinse_delay_seconds
    optimistic: true
    restore_value: true
    initial_value: 120
    min_value: 30
    max_value: 180
    step: 5
    mode: box

  - platform: template
    name: "Silvia Coffee Dose Grams"
    id: silvia_coffee_dose_grams
    optimistic: true
    restore_value: true
    initial_value: 14
    min_value: 5
    max_value: 25
    step: 0.5
    unit_of_measurement: "g"
    mode: box
          
# -------------------------
# Реле включения машины
# -------------------------

switch:
  - platform: template
    name: "Silvia Pump Start Boost"
    id: silvia_pump_start_boost
    lambda: 'return id(silvia_pump_start_boost_enabled);'
    turn_on_action:
      - lambda: |-
          id(silvia_pump_start_boost_enabled) = true;
          id(silvia_pump_start_boost).publish_state(true);
          id(silvia_pump_dimmer).set_start_boost_ms((uint32_t) id(silvia_pump_start_boost_ms).state);
    turn_off_action:
      - lambda: |-
          id(silvia_pump_start_boost_enabled) = false;
          id(silvia_pump_start_boost).publish_state(false);
          id(silvia_pump_dimmer).set_start_boost_ms(0);

  - platform: template
    # Historical HA-facing name; there is no physical power relay in the 2-relay design.
    name: "Silvia Power Relay"
    id: silvia_power_relay
    lambda: 'return id(silvia_power_state);'
    turn_on_action:
      - lambda: |-
          id(silvia_power_state) = true;
          id(silvia_power_relay).publish_state(true);
      - script.execute: auto_off_timer
      - script.execute: status_led_update
      - script.execute: apply_pid_mode
    turn_off_action:
      - lambda: |-
          id(silvia_power_state) = false;
          id(silvia_power_relay).publish_state(false);
      - climate.control:
          id: silvia_brew_pid
          mode: "OFF"
      - output.set_level:
          id: silvia_pid_heat_output
          level: 0%
      - script.execute: pump_output_off
      - switch.turn_off: silvia_pump_relay
      - switch.turn_off: silvia_brew_valve_relay
      - script.stop: brew_shot_timer
      - script.stop: backflush_program
      - script.stop: auto_off_timer
      - script.stop: status_led_blink_slow
      - script.stop: status_led_blink_fast
      - light.turn_off: silvia_status_led_light
      - lambda: |-
          id(auto_off_remaining_seconds) = 0;
          id(brew_shot_running) = false;
          id(brew_shot_phase) = 0;
          id(brew_shot_phase_end_ms) = 0;
          id(hot_water_running) = false;
          id(backflush_running) = false;
          id(silvia_brew_shot_remaining).publish_state(0);
          id(silvia_brew_shot_status).publish_state("Ожидание");

  - platform: gpio
    name: "Silvia Pump Relay"
    id: silvia_pump_relay
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      number: ${pump_relay_pin}
      inverted: true
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(silvia_power_state);'
          then:
            - switch.turn_off: silvia_pump_relay
          else:
            - script.execute: auto_off_timer
            - script.execute: status_led_update

  - platform: gpio
    name: "Silvia Brew Valve Relay"
    id: silvia_brew_valve_relay
    restore_mode: ALWAYS_OFF
    pin:
      number: ${brew_valve_relay_pin}
      inverted: true
    on_turn_on:
      - if:
          condition:
            lambda: 'return !id(silvia_power_state);'
          then:
            - switch.turn_off: silvia_brew_valve_relay
          else:
            - script.execute: auto_off_timer
            - script.execute: status_led_update

  - platform: template
    name: "Silvia Brew Shot"
    id: silvia_brew_shot_control
    lambda: 'return id(brew_shot_running);'
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(silvia_power_state) && !id(backflush_running);'
          then:
            - script.execute: auto_off_timer
            - script.execute: status_led_update
            - script.execute: brew_shot_timer
    turn_off_action:
      - script.stop: brew_shot_timer
      - script.execute: pump_output_off
      - switch.turn_off: silvia_brew_valve_relay
      - lambda: |-
          id(brew_shot_running) = false;
          id(brew_shot_phase) = 0;
          id(brew_shot_phase_end_ms) = 0;
          id(silvia_brew_shot_remaining).publish_state(0);
          id(silvia_brew_shot_status).publish_state("Ожидание");

  - platform: template
    name: "Silvia Hot Water"
    id: silvia_hot_water_control
    lambda: 'return id(hot_water_running);'
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(silvia_power_state) && !id(backflush_running);'
          then:
            - script.execute: auto_off_timer
            - script.execute: status_led_update
            - lambda: 'id(hot_water_running) = true;'
            - script.execute: pump_output_on
    turn_off_action:
      - lambda: 'id(hot_water_running) = false;'
      - if:
          condition:
            lambda: 'return !id(brew_shot_running) && !id(backflush_running);'
          then:
            - script.execute: pump_output_off

  - platform: template
    name: "Silvia Steam Mode"
    id: silvia_steam_mode_control
    lambda: 'return id(silvia_pid_mode).current_option() == "Steam";'
    turn_on_action:
      - script.execute: auto_off_timer
      - script.execute: status_led_update
      - select.set:
          id: silvia_pid_mode
          option: "Steam"
    turn_off_action:
      - select.set:
          id: silvia_pid_mode
          option: "Brew"

# -------------------------
# Родная кнопка Power
# -------------------------

binary_sensor:
  - platform: gpio
    name: "Silvia Power Button"
    id: silvia_power_button
    pin:
      number: ${button_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      - switch.toggle: silvia_power_relay

  - platform: gpio
    name: "Silvia Water Level"
    id: silvia_water_level
    pin:
      number: ${water_level_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 500ms
      - delayed_off: 500ms

  - platform: gpio
    name: "Silvia Brew Shot Button"
    id: silvia_brew_shot_button
    pin:
      number: ${brew_button_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      - switch.turn_on: silvia_brew_shot_control
    on_release:
      - switch.turn_off: silvia_brew_shot_control

  - platform: gpio
    name: "Silvia Hot Water Button"
    id: silvia_hot_water_button
    pin:
      number: ${hot_water_button_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      - switch.turn_on: silvia_hot_water_control
    on_release:
      - switch.turn_off: silvia_hot_water_control

  - platform: gpio
    name: "Silvia Brew Steam Mode Button"
    id: silvia_brew_steam_mode_button
    pin:
      number: ${steam_mode_button_pin}
      mode:
        input: true
        pullup: true
      inverted: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      - switch.turn_on: silvia_steam_mode_control
    on_release:
      - switch.turn_off: silvia_steam_mode_control
        
# -------------------------
# Автоотключение
# 0 минут = автоотключение выключено
# -------------------------

script:
  - id: pump_output_on
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return ${use_pump_dimmer};'
          then:
            - output.set_level:
                id: silvia_pump_dimmer
                level: !lambda |-
                  const std::string profile = id(silvia_pump_profile).current_option();
                  float drive = id(silvia_manual_pump_power).state / 100.0f;
                  if (profile == "Classic") drive = 1.00f;
                  else if (profile == "Lever") drive = 0.65f;
                  else if (profile == "Slayer Style") drive = 0.55f;
                  else if (profile == "Bloom") drive = 0.45f;
                  if (drive < 0.0f) drive = 0.0f;
                  if (drive > 1.00f) drive = 1.00f;
                  id(pump_dimmer_output_value) = drive;
                  return drive;
          else:
            - lambda: 'id(pump_dimmer_output_value) = 1.0f;'
            - switch.turn_on: silvia_pump_relay

  - id: pump_output_off
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return ${use_pump_dimmer};'
          then:
            - lambda: 'id(pump_dimmer_output_value) = 0.0f;'
            - output.set_level:
                id: silvia_pump_dimmer
                level: 0%
          else:
            - lambda: 'id(pump_dimmer_output_value) = 0.0f;'
            - switch.turn_off: silvia_pump_relay

  - id: brew_shot_timer
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(silvia_power_state) && !id(backflush_running);'
          then:
            - lambda: |-
                id(brew_shot_running) = true;
                id(brew_shot_phase) = 0;
                id(brew_shot_phase_end_ms) = millis();
                id(hot_water_running) = false;
                id(silvia_brew_shot_remaining).publish_state(0);
                id(silvia_brew_shot_status).publish_state("Запуск");
            - switch.turn_on: silvia_brew_valve_relay
            - if:
                condition:
                  lambda: 'return id(silvia_preinfusion_pump_seconds).state > 0.0f;'
                then:
                  - lambda: |-
                      const int seconds = (int) (id(silvia_preinfusion_pump_seconds).state + 0.999f);
                      id(brew_shot_phase) = 1;
                      id(brew_shot_phase_end_ms) =
                          millis() + (uint32_t) (id(silvia_preinfusion_pump_seconds).state * 1000.0f);
                      id(silvia_brew_shot_remaining).publish_state(seconds);
                      id(silvia_brew_shot_status).publish_state(
                          str_sprintf("Предсмачивание: %d с", seconds));
                  - script.execute: pump_output_on
                  - delay: !lambda |-
                      return (uint32_t)(id(silvia_preinfusion_pump_seconds).state * 1000.0f);
                  - script.execute: pump_output_off
            - if:
                condition:
                  lambda: 'return id(silvia_preinfusion_pause_seconds).state > 0.0f;'
                then:
                  - lambda: |-
                      const int seconds = (int) (id(silvia_preinfusion_pause_seconds).state + 0.999f);
                      id(brew_shot_phase) = 2;
                      id(brew_shot_phase_end_ms) =
                          millis() + (uint32_t) (id(silvia_preinfusion_pause_seconds).state * 1000.0f);
                      id(silvia_brew_shot_remaining).publish_state(seconds);
                      id(silvia_brew_shot_status).publish_state(
                          str_sprintf("Пауза: %d с", seconds));
                  - delay: !lambda |-
                      return (uint32_t)(id(silvia_preinfusion_pause_seconds).state * 1000.0f);
            - lambda: |-
                const int seconds = (int) (id(silvia_brew_shot_seconds).state + 0.999f);
                id(brew_shot_phase) = 3;
                id(brew_shot_phase_end_ms) =
                    millis() + (uint32_t) (id(silvia_brew_shot_seconds).state * 1000.0f);
                id(silvia_brew_shot_remaining).publish_state(seconds);
                id(silvia_brew_shot_status).publish_state(
                    str_sprintf("Пролив: %d с", seconds));
            - if:
                condition:
                  lambda: 'return ${use_pump_dimmer};'
                then:
                  - repeat:
                      count: !lambda |-
                        float profile_seconds = id(silvia_brew_shot_seconds).state;
                        if (profile_seconds < 0.5f) profile_seconds = 0.5f;
                        const int steps = (int) (profile_seconds * 2.0f + 0.999f);
                        return steps < 1 ? 1 : steps;
                      then:
                        - output.set_level:
                            id: silvia_pump_dimmer
                            level: !lambda |-
                              const std::string profile = id(silvia_pump_profile).current_option();
                              float profile_seconds = id(silvia_brew_shot_seconds).state;
                              if (profile_seconds < 0.5f) profile_seconds = 0.5f;
                              const int steps = (int) (profile_seconds * 2.0f + 0.999f);
                              const float denom = steps > 1 ? (float) (steps - 1) : 1.0f;
                              float t = (float) iteration / denom;
                              if (t < 0.0f) t = 0.0f;
                              if (t > 1.0f) t = 1.0f;
                              float drive = id(silvia_manual_pump_power).state / 100.0f;
                              if (profile == "Classic") {
                                drive = 1.00f;
                              } else if (profile == "Lever") {
                                if (t < 0.60f) {
                                  const float x = t / 0.60f;
                                  const float s = x * x * (3.0f - 2.0f * x);
                                  drive = 0.35f + (0.75f - 0.35f) * s;
                                } else {
                                  const float x = (t - 0.60f) / 0.40f;
                                  const float s = x * x * (3.0f - 2.0f * x);
                                  drive = 0.75f + (0.45f - 0.75f) * s;
                                }
                              } else if (profile == "Slayer Style") {
                                if (t < 0.35f) {
                                  const float x = t / 0.35f;
                                  const float s = x * x * (3.0f - 2.0f * x);
                                  drive = 0.30f + (0.55f - 0.30f) * s;
                                } else {
                                  drive = 0.55f;
                                }
                              } else if (profile == "Bloom") {
                                if (t < 0.30f) {
                                  drive = 0.35f;
                                } else {
                                  const float x = (t - 0.30f) / 0.70f;
                                  const float s = x * x * (3.0f - 2.0f * x);
                                  drive = 0.35f + (0.85f - 0.35f) * s;
                                }
                              }
                              if (drive < 0.0f) drive = 0.0f;
                              if (drive > 1.00f) drive = 1.00f;
                              id(pump_dimmer_output_value) = drive;
                              return drive;
                        - delay: 500ms
                else:
                  - script.execute: pump_output_on
                  - delay: !lambda |-
                      return (uint32_t)(id(silvia_brew_shot_seconds).state * 1000.0f);
            - script.execute: pump_output_off
            - switch.turn_off: silvia_brew_valve_relay
            - lambda: |-
                id(brew_shot_running) = false;
                id(brew_shot_phase) = 0;
                id(brew_shot_phase_end_ms) = 0;
                id(silvia_brew_shot_remaining).publish_state(0);
                id(silvia_brew_shot_status).publish_state("Ожидание");
                id(backflush_shots)++;
                id(lifetime_shots)++;
                id(silvia_backflush_shots_sensor).publish_state(id(backflush_shots));
                id(silvia_lifetime_shots_sensor).publish_state(id(lifetime_shots));
                id(silvia_backflush_status).update();
          else:
            - lambda: |-
                id(brew_shot_running) = false;
                id(brew_shot_phase) = 0;
                id(brew_shot_phase_end_ms) = 0;
                id(silvia_brew_shot_remaining).publish_state(0);
                id(silvia_brew_shot_status).publish_state("Ожидание");

  - id: backflush_program
    mode: single
    then:
      - if:
          condition:
            lambda: |-
              return id(silvia_power_state) &&
                     !id(brew_shot_running) &&
                     !id(hot_water_running) &&
                     !id(backflush_running);
          then:
            - script.execute: auto_off_timer
            - script.execute: status_led_update
            - lambda: |-
                id(backflush_running) = true;
                id(backflush_stage) = 1;
                id(backflush_cycle) = 0;
                id(backflush_phase_end_ms) = 0;
                id(silvia_backflush_status).update();
            - script.execute: pump_output_off
            - switch.turn_off: silvia_brew_valve_relay
            - repeat:
                count: 8
                then:
                  - lambda: |-
                      id(backflush_cycle)++;
                      id(silvia_backflush_status).update();
                  - switch.turn_on: silvia_brew_valve_relay
                  - script.execute: pump_output_on
                  - delay: 5s
                  - script.execute: pump_output_off
                  - switch.turn_off: silvia_brew_valve_relay
                  - delay: 10s
            - lambda: |-
                const int seconds = (int) (id(silvia_backflush_rinse_delay_seconds).state + 0.999f);
                id(backflush_stage) = 2;
                id(backflush_cycle) = seconds;
                id(backflush_phase_end_ms) =
                    millis() + (uint32_t) (id(silvia_backflush_rinse_delay_seconds).state * 1000.0f);
                id(silvia_backflush_status).update();
            - delay: !lambda |-
                return (uint32_t)(id(silvia_backflush_rinse_delay_seconds).state * 1000.0f);
            - lambda: |-
                id(backflush_stage) = 3;
                id(backflush_cycle) = 0;
                id(backflush_phase_end_ms) = 0;
                id(silvia_backflush_status).update();
            - script.execute: pump_output_off
            - switch.turn_off: silvia_brew_valve_relay
            - repeat:
                count: 8
                then:
                  - lambda: |-
                      id(backflush_cycle)++;
                      id(silvia_backflush_status).update();
                  - switch.turn_on: silvia_brew_valve_relay
                  - script.execute: pump_output_on
                  - delay: 5s
                  - script.execute: pump_output_off
                  - switch.turn_off: silvia_brew_valve_relay
                  - delay: 10s
            - lambda: |-
                id(backflush_shots) = 0;
                id(backflush_running) = false;
                id(backflush_stage) = 0;
                id(backflush_cycle) = 0;
                id(backflush_phase_end_ms) = 0;
                id(silvia_backflush_shots_sensor).publish_state(id(backflush_shots));
                id(silvia_backflush_status).update();
            - script.execute: status_led_update
          else:
            - logger.log: "Silvia backflush blocked: machine is busy or power is OFF"

  - id: auto_off_timer
    mode: restart
    then:
      - lambda: |-
          if (id(silvia_auto_off_minutes).state <= 0) {
            id(auto_off_remaining_seconds) = 0;
          } else {
            id(auto_off_remaining_seconds) = (int)(id(silvia_auto_off_minutes).state * 60.0f);
          }
      - script.execute: status_led_update

      - if:
          condition:
            lambda: 'return id(silvia_auto_off_minutes).state > 0;'
          then:
            - while:
                condition:
                  lambda: |-
                    return id(silvia_power_state) &&
                           id(auto_off_remaining_seconds) > 0 &&
                           id(silvia_auto_off_minutes).state > 0;
                then:
                  - delay: 1s
                  - lambda: |-
                      id(auto_off_remaining_seconds)--;

                  - if:
                      condition:
                        lambda: 'return id(auto_off_remaining_seconds) == 60;'
                      then:
                        - script.execute: status_led_update

            - if:
                condition:
                  lambda: |-
                    return id(silvia_power_state) &&
                           id(auto_off_remaining_seconds) <= 0 &&
                           id(silvia_auto_off_minutes).state > 0;
                then:
                  - switch.turn_off: silvia_power_relay

  - id: status_led_update
    mode: restart
    then:
      - script.stop: status_led_blink_slow
      - script.stop: status_led_blink_fast

      - if:
          condition:
            lambda: 'return !id(silvia_power_state);'
          then:
            - light.turn_off: silvia_status_led_light
          else:
            - if:
                condition:
                  lambda: 'return id(silvia_auto_off_minutes).state <= 0;'
                then:
                  - light.turn_on: silvia_status_led_light
                else:
                  - if:
                      condition:
                        lambda: 'return id(auto_off_remaining_seconds) > 0 && id(auto_off_remaining_seconds) <= 60;'
                      then:
                        - script.execute: status_led_blink_fast
                      else:
                        - script.execute: status_led_blink_slow

  - id: status_led_blink_slow
    mode: restart
    then:
      - while:
          condition:
            lambda: |-
              return id(silvia_power_state) &&
                     id(silvia_auto_off_minutes).state > 0 &&
                     id(auto_off_remaining_seconds) > 60;
          then:
            - light.turn_on: silvia_status_led_light
            - delay: 1s
            - light.turn_off: silvia_status_led_light
            - delay: 2s

  - id: status_led_blink_fast
    mode: restart
    then:
      - while:
          condition:
            lambda: |-
              return id(silvia_power_state) &&
                     id(silvia_auto_off_minutes).state > 0 &&
                     id(auto_off_remaining_seconds) > 0 &&
                     id(auto_off_remaining_seconds) <= 60;
          then:
            - light.turn_on: silvia_status_led_light
            - delay: 300ms
            - light.turn_off: silvia_status_led_light
            - delay: 300ms

  - id: apply_pid_parameters
    mode: restart
    then:
      - climate.pid.set_control_parameters:
          id: silvia_brew_pid
          kp: !lambda 'return id(silvia_pid_kp).state;'
          ki: !lambda 'return id(silvia_pid_ki).state;'
          kd: !lambda 'return id(silvia_pid_kd).state;'

  - id: apply_pid_mode
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return id(silvia_pid_mode).current_option() == "Brew";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'

      - if:
          condition:
            lambda: 'return id(silvia_pid_mode).current_option() == "Steam";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'

          
# -------------------------
# Кнопки в Home Assistant
# -------------------------

button:
  - platform: restart
    name: "Silvia ESP Restart"

  - platform: template
    name: "Silvia Reset Auto Off Timer"
    on_press:
      - if:
          condition:
            lambda: 'return id(silvia_power_state);'
          then:
            - script.execute: auto_off_timer

  - platform: template
    name: "Silvia PID Autotune"
    on_press:
      - if:
          condition:
            lambda: 'return id(silvia_power_state);'
          then:
            - logger.log: "Silvia PID autotune started"
            - lambda: |-
                id(pid_autotune_running) = true;
                id(pid_autotune_status) = 1;
                id(pid_autotune_elapsed_seconds) = 0;
                id(silvia_pid_autotune_status).publish_state("Running | starting");

            - climate.pid.set_control_parameters:
                id: silvia_brew_pid
                kp: 0.0
                ki: 0.0
                kd: 0.0

            # Запускаем autotune
            - climate.pid.autotune:
                id: silvia_brew_pid
                noiseband: 0.25
                positive_output: 1.0
                negative_output: 0.0
          else:
            - logger.log: "Silvia PID autotune blocked: machine power is OFF"
            - lambda: |-
                id(pid_autotune_status) = 3;
                id(silvia_pid_autotune_status).publish_state("Blocked | machine power is OFF");

  - platform: template
    name: "Silvia Start Backflush"
    on_press:
      - script.execute: backflush_program

  - platform: template
    name: "Silvia Stop Backflush"
    on_press:
      - script.stop: backflush_program
      - script.execute: pump_output_off
      - switch.turn_off: silvia_brew_valve_relay
      - lambda: |-
          id(backflush_running) = false;
          id(backflush_stage) = 0;
          id(backflush_cycle) = 0;
          id(backflush_phase_end_ms) = 0;
          id(silvia_backflush_status).update();
      - script.execute: status_led_update

  - platform: template
    name: "Silvia Reset Backflush Shots"
    on_press:
      - lambda: |-
          id(backflush_shots) = 0;
          id(silvia_backflush_shots_sensor).publish_state(id(backflush_shots));
          id(silvia_backflush_status).update();

# -------------------------
# Статусы
# -------------------------
sensor:
  
  - platform: template
    name: "Silvia PID Heat Output"
    id: silvia_pid_heat_output_percent
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      return id(pid_heat_output_value) * 100.0f;

  - platform: template
    name: "Silvia Pump Dimmer Output"
    id: silvia_pump_dimmer_output_percent
    unit_of_measurement: "%"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      return id(pump_dimmer_output_value) * 100.0f;

  - platform: template
    name: "Silvia Auto Off Remaining"
    id: silvia_auto_off_remaining
    unit_of_measurement: "min"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(auto_off_remaining_seconds) / 60.0f;

  - platform: template
    name: "Silvia Brew Shot Remaining"
    id: silvia_brew_shot_remaining
    unit_of_measurement: "s"
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    name: "Silvia Backflush Shots"
    id: silvia_backflush_shots_sensor
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      return id(backflush_shots);

  - platform: template
    name: "Silvia Lifetime Shots"
    id: silvia_lifetime_shots_sensor
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      return id(lifetime_shots);

  - platform: template
    name: "Silvia Coffee Grounds Used"
    id: silvia_coffee_grounds_used
    unit_of_measurement: "g"
    state_class: total_increasing
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      return id(lifetime_shots) * id(silvia_coffee_dose_grams).state;

  - platform: template
    name: "Silvia Brew Target Sensor"
    id: silvia_brew_target_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      return id(silvia_brew_target).state;

  - platform: template
    name: "Silvia Steam Target Sensor"
    id: silvia_steam_target_sensor
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      return id(silvia_steam_target).state;

  - platform: template
    name: "Silvia Active Target"
    id: silvia_active_target
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      if (id(silvia_pid_mode).current_option() == "Steam") {
        return id(silvia_steam_target).state;
      }
      return id(silvia_brew_target).state;

  - platform: template
    name: "Silvia Estimated Brew Temperature"
    id: silvia_estimated_brew_temperature
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      if (!id(silvia_boiler_temp_pt100).has_state()) {
        return NAN;
      }
      return id(silvia_boiler_temp_pt100).state -
             id(silvia_brew_temperature_offset).state;

  - platform: template
    name: "Silvia Estimated Brew Target"
    id: silvia_estimated_brew_target
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(silvia_brew_target).state;

  - platform: template
    name: "Silvia Brew Boiler Target"
    id: silvia_brew_boiler_target
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(silvia_brew_target).state +
             id(silvia_brew_temperature_offset).state;

  # PID uses the estimated water temperature for brewing and the raw
  # boiler temperature for steam. Hardware protection always uses PT100.
  - platform: template
    id: silvia_pid_control_temperature
    internal: true
    update_interval: 1s
    lambda: |-
      if (!id(silvia_boiler_temp_pt100).has_state()) {
        return NAN;
      }
      if (id(silvia_pid_mode).current_option() == "Steam") {
        return id(silvia_boiler_temp_pt100).state;
      }
      return id(silvia_boiler_temp_pt100).state -
             id(silvia_brew_temperature_offset).state;

  - platform: max31865
    name: "Silvia Boiler Temperature PT100"
    id: silvia_boiler_temp_pt100
    cs_pin: ${max31865_cs_pin}
    reference_resistance: 430 Ω
    rtd_nominal_resistance: 100 Ω
    rtd_wires: 3
    mains_filter: 50Hz
    update_interval: 1s
    accuracy_decimals: 1
    on_value_range:
      - above: ${overtemp_limit}
        then:
          - logger.log:
              level: ERROR
              format: "Silvia overtemperature: heater and machine power disabled"
          - climate.control:
              id: silvia_brew_pid
              mode: "OFF"
          - output.set_level:
              id: silvia_pid_heat_output
              level: 0%
          - switch.turn_off: silvia_pump_relay
          - switch.turn_off: silvia_brew_valve_relay
          - switch.turn_off: silvia_power_relay

      
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "Silvia ESP IP"

  - platform: template
    name: "Silvia Power Status"
    lambda: |-
      if (id(silvia_power_state)) {
        return {"ON"};
      } else {
        return {"OFF"};
      }

  - platform: template
    name: "Silvia Auto Off Status"
    update_interval: 5s
    lambda: |-
      if (!id(silvia_power_state)) {
        return {"OFF"};
      }
      if (id(silvia_auto_off_minutes).state <= 0) {
        return {"Auto-off disabled"};
      }
      return {"Auto-off active"};

  - platform: template
    name: "Silvia Brew Shot Status"
    id: silvia_brew_shot_status
    icon: "mdi:timer-sand"
    update_interval: never

  - platform: template
    name: "Silvia Pump Profile Preview"
    id: silvia_pump_profile_preview
    icon: "mdi:sine-wave"
    update_interval: 10s
    lambda: |-
      const std::string profile = id(silvia_pump_profile).current_option();
      if (profile == "Classic") {
        return {"Классика | диммер 100%"};
      }
      if (profile == "Lever") {
        return {"Lever | плавно 35% → 75% → 45%"};
      }
      if (profile == "Slayer Style") {
        return {"Slayer | плавно 30% → 55%, потом удержание"};
      }
      if (profile == "Bloom") {
        return {"Bloom | 35%, затем плавно до 85%"};
      }
      return {str_sprintf("Manual | диммер %.0f%%", id(silvia_manual_pump_power).state)};

  - platform: template
    name: "Silvia Water Status"
    update_interval: 2s
    lambda: |-
      if (id(silvia_water_level).state) {
        return {"Water OK"};
      } else {
        return {"Water LOW"};
      }

  - platform: template
    name: "Silvia Backflush Status"
    id: silvia_backflush_status
    update_interval: 10s
    lambda: |-
      if (id(backflush_running)) {
        if (id(backflush_stage) == 1) {
          return {str_sprintf("Cleaning | %d/8 cycles", id(backflush_cycle))};
        }
        if (id(backflush_stage) == 3) {
          return {str_sprintf("Rinsing | %d/8 cycles", id(backflush_cycle))};
        }
        if (id(backflush_stage) == 2) {
          return {str_sprintf("Prepare rinse | %d s", id(backflush_cycle))};
        }
        return {"Backflush running"};
      }
      const int shots = id(backflush_shots);
      const float reminder_state = id(silvia_backflush_reminder_shots).state;
      if (!std::isfinite(reminder_state)) {
        return {"OK"};
      }
      const int reminder = (int) reminder_state;
      if (reminder <= 0) {
        return {"Reminder disabled"};
      }
      if (shots >= reminder) {
        return {str_sprintf("Backflush due | %d/%d shots", shots, reminder)};
      }
      return {str_sprintf("OK | %d/%d shots", shots, reminder)};

  - platform: template
    name: "Silvia PID Autotune Status"
    id: silvia_pid_autotune_status
    update_interval: 2s
    lambda: |-
      if (id(pid_autotune_running)) {
        const int minutes = id(pid_autotune_elapsed_seconds) / 60;
        const int seconds = id(pid_autotune_elapsed_seconds) % 60;

        if (!id(silvia_power_state)) {
          return {str_sprintf("Running | heater disabled | %02d:%02d", minutes, seconds)};
        }

        return {str_sprintf(
            "Running | %02d:%02d | %.1f/%.1f C | %.1f%%",
            minutes,
            seconds,
            id(silvia_boiler_temp_pt100).state,
            id(silvia_brew_pid).target_temperature,
            id(pid_heat_output_value) * 100.0f)};
      }

      if (id(pid_autotune_status) == 2) {
        return {str_sprintf(
            "Completed | KP %.5f | KI %.5f | KD %.5f",
            id(silvia_pid_kp).state,
            id(silvia_pid_ki).state,
            id(silvia_pid_kd).state)};
      }

      if (id(pid_autotune_status) == 3) {
        return {"Blocked | machine power is OFF"};
      }

      return {"Idle"};

output:
  - platform: gpio
    id: silvia_status_led
    pin:
      number: ${led_pin}
      inverted: false

  # Реальный PWM-выход на SSR нагревателя
  - platform: slow_pwm
    id: silvia_heater_ssr_pwm
    pin: ${heater_ssr_pin}
    period: 1s

  # RobotDyn/Robotron AC dimmer in full-cycle skip mode for pump tests.
  # Percent means the share of full mains periods passed to the pump.
  - platform: ac_cycle_skip
    id: silvia_pump_dimmer
    gate_pin: ${pump_dimmer_gate_pin}
    min_power: 0%
    max_power: 100%
    zero_means_zero: true
    noise_filter_us: 5000
    min_zero_cross_interval_us: 6000
    max_zero_cross_interval_us: 13000
    gate_delay_us: 100
    gate_pulse_us: 300
    start_boost_ms: 0
    ramp_ms: 800
    zero_cross_pin:
      number: ${pump_dimmer_zero_cross_pin}
      mode:
        input: true

  # PID пишет сюда.
  # Сохраняем процент для HA и передаём его в SSR.
  - platform: template
    id: silvia_pid_heat_output
    type: float
    write_action:
      - lambda: |-
          float level = state;
          const float temperature = id(silvia_boiler_temp_pt100).state;

          // Never energize the heater while logical power is off, with an invalid
          // reading, or above the safety limit.
          if (!id(silvia_power_state) ||
              !id(silvia_boiler_temp_pt100).has_state() ||
              !std::isfinite(temperature) ||
              temperature >= ${overtemp_limit}f) {
            level = 0.0f;
          }

          // Убираем микромигание около 0% и 100%
          if (level >= 0.995f) {
            level = 1.0f;
          } else if (level <= 0.005f) {
            level = 0.0f;
          }

          id(pid_heat_output_value) = level;
          id(silvia_heater_ssr_pwm).set_level(level);

light:
  - platform: binary
    name: "Silvia Status LED"
    id: silvia_status_led_light
    output: silvia_status_led



climate:
  - platform: pid
    name: "Silvia Brew PID"
    id: silvia_brew_pid
    sensor: silvia_pid_control_temperature
    default_target_temperature: 93°C
    heat_output: silvia_pid_heat_output

    control_parameters:
      kp: 0.12492
      ki: 0.00065
      kd: 6.00246

    visual:
      min_temperature: 80°C
      max_temperature: 150°C
      temperature_step: 0.5°C

    on_control:
      - if:
          condition:
            lambda: |-
              if (!x.get_target_temperature().has_value()) return false;
              float target = x.get_target_temperature().value();
              return id(silvia_pid_mode).current_option() == "Brew" &&
                     fabs(id(silvia_brew_target).state - target) > 0.05;
          then:
            - number.set:
                id: silvia_brew_target
                value: !lambda |-
                  return x.get_target_temperature().value();

      - if:
          condition:
            lambda: |-
              if (!x.get_target_temperature().has_value()) return false;
              float target = x.get_target_temperature().value();
              return id(silvia_pid_mode).current_option() == "Steam" &&
                     fabs(id(silvia_steam_target).state - target) > 0.05;
          then:
            - number.set:
                id: silvia_steam_target
                value: !lambda |-
                  return x.get_target_temperature().value();

      
select:
  - platform: template
    name: "Silvia Brew Profile"
    id: silvia_brew_profile
    optimistic: true
    restore_value: true
    options:
      - "Classic"
      - "Soft Preinfusion"
      - "Long Preinfusion"
      - "Custom"
    initial_option: "Classic"
    set_action:
      - if:
          condition:
            lambda: 'return x == "Classic";'
          then:
            - lambda: 'id(brew_profile_applying) = true;'
            - number.set:
                id: silvia_preinfusion_pump_seconds
                value: 0
            - number.set:
                id: silvia_preinfusion_pause_seconds
                value: 0
            - number.set:
                id: silvia_brew_shot_seconds
                value: 25
            - lambda: 'id(brew_profile_applying) = false;'

      - if:
          condition:
            lambda: 'return x == "Soft Preinfusion";'
          then:
            - lambda: 'id(brew_profile_applying) = true;'
            - number.set:
                id: silvia_preinfusion_pump_seconds
                value: 2
            - number.set:
                id: silvia_preinfusion_pause_seconds
                value: 5
            - number.set:
                id: silvia_brew_shot_seconds
                value: 25
            - lambda: 'id(brew_profile_applying) = false;'

      - if:
          condition:
            lambda: 'return x == "Long Preinfusion";'
          then:
            - lambda: 'id(brew_profile_applying) = true;'
            - number.set:
                id: silvia_preinfusion_pump_seconds
                value: 3
            - number.set:
                id: silvia_preinfusion_pause_seconds
                value: 10
            - number.set:
                id: silvia_brew_shot_seconds
                value: 28
            - lambda: 'id(brew_profile_applying) = false;'

  - platform: template
    name: "Silvia Pump Profile"
    id: silvia_pump_profile
    optimistic: true
    restore_value: true
    options:
      - "Classic"
      - "Lever"
      - "Slayer Style"
      - "Bloom"
      - "Manual"
    initial_option: "Classic"
    set_action:
      - component.update: silvia_pump_profile_preview

  - platform: template
    name: "Silvia PID Mode"
    id: silvia_pid_mode
    optimistic: true
    restore_value: true
    options:
      - "Brew"
      - "Steam"
    initial_option: "Brew"
    set_action:
      - if:
          condition:
            lambda: 'return x == "Brew";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_brew_target).state;'

      - if:
          condition:
            lambda: 'return x == "Steam";'
          then:
            - if:
                condition:
                  lambda: 'return id(silvia_power_state);'
                then:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "HEAT"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'
                else:
                  - climate.control:
                      id: silvia_brew_pid
                      mode: "OFF"
                      target_temperature: !lambda 'return id(silvia_steam_target).state;'
